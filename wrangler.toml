name = "autowasha"

# Cloudflare Tunnel Configuration
# This tunnel routes traffic to local backend services

[build]
command = "npm run build"

# Tunnel ID for AutoWasha
tunnel = "c6cca2fa-ad06-47ae-8c8f-0e0b825489c9"

# Configure which services the tunnel routes to
[[services]]
service = "http://localhost:5000"
environment = "production"
